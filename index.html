<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https:; style-src 'self' 'unsafe-inline' https:; font-src 'self' data: https:; img-src 'self' data: blob: https:; connect-src 'self' data: blob: https: ws: wss:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

  <!-- Primary Meta Tags -->
  <title>Simón Sandrea | SEO Inteligente</title>
  <meta name="title" content="Simón Sandrea | SEO Inteligente">
  <meta name="description"
    content="Estrategia clara, realista y potente. Transformamos el código en activos financieros mediante auditoría de viabilidad y arquitectura de dominio.">
  <meta name="keywords"
    content="SEO Inteligente, Consultor SEO, Estrategia Digital, Search Console, Arquitectura Web, Viabilidad SEO, Simón Sandrea">
  <meta name="author" content="Simón Sandrea">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#1C1C1C">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://simonsandrea.com/">
  <meta property="og:title" content="Simón Sandrea | SEO Inteligente">
  <meta property="og:description"
    content="Ni trucos, ni humo. Estrategia clara, realista y potente basada en datos crudos.">
  <meta property="og:image" content="https://simonsandrea.com/og-image.jpg">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://simonsandrea.com/">
  <meta property="twitter:title" content="Simón Sandrea | SEO Inteligente">
  <meta property="twitter:description"
    content="Estrategia clara, realista y potente. Basado en datos crudos de Search Console.">
  <meta property="twitter:image" content="https://simonsandrea.com/og-image.jpg">

  <!-- Favicon & Icons -->
  <link rel="canonical" href="https://simonsandrea.com/" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Performance: Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;800&display=swap" rel="stylesheet">
  <script>
    // Safe process polyfill for browser tools
    window.process = window.process || { env: { NODE_ENV: 'production' } };
  </script>

  <style>
    body {
      background-color: #FFFFFF;
      color: #1C1C1C;
      overflow-x: hidden;
      /* Hardware Acceleration for main container */
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* Mobile Optimization: Improve touch latency */
    a,
    button {
      touch-action: manipulation;
    }

    /* Custom selection color for that premium feel */
    ::selection {
      background-color: #B0E0E6;
      /* Powder Blue */
      color: #1C1C1C;
    }

    /* Accessibility: Skip Link Focus Styles */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: #1C1C1C;
      color: #FFFFFF;
      padding: 8px;
      z-index: 100;
      transition: top 0.3s;
    }

    .skip-link:focus {
      top: 0;
    }

    /* Smooth Scrollbar for Webkit */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #FFFFFF;
    }

    ::-webkit-scrollbar-thumb {
      background-color: #F4F0E4;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background-color: #B0E0E6;
    }

    /* Utility for GPU Promotion */
    .gpu-accelerated {
      transform: translateZ(0);
      will-change: transform;
    }
  </style>
  <link rel="stylesheet" href="/index.css">
  <script type="module" src="/index.tsx"></script>
</head>

<body>
  <div id="root"></div>
</body>

</html>
